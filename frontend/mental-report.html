<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zensutra — My Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="dashboard.css">
<style>
.risk-badge{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:700;padding:8px 20px;border-radius:100px;text-transform:uppercase;letter-spacing:1px;}
.risk-low{background:rgba(82,183,136,.15);color:var(--sage2);border:1px solid rgba(82,183,136,.25);}
.risk-moderate{background:rgba(244,162,97,.15);color:var(--gold);border:1px solid rgba(244,162,97,.25);}
.risk-high{background:rgba(224,112,128,.15);color:var(--rose);border:1px solid rgba(224,112,128,.25);}
.risk-severe{background:rgba(200,50,50,.2);color:#ff8080;border:1px solid rgba(200,50,50,.3);}
.score-bar{height:8px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden;margin-top:6px;}
.score-fill{height:100%;border-radius:100px;transition:width 1s ease;}
.rec-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
.rec-priority{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:6px;}
.rec-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:4px;}
.rec-desc{font-size:12px;color:var(--muted);line-height:1.6;}
.report-empty{text-align:center;padding:60px 20px;color:var(--muted);}
.report-empty h2{font-family:'DM Serif Display',serif;font-size:24px;color:#fff;margin-bottom:12px;}

/* Fix chart canvas so it doesn't blow out the card */
#radarChart {
  max-height: 160px;
  width: 100% !important;
  display: block;
}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div class="particles" id="particles"></div>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🧠</div><div><div class="logo-name">Zensutra</div><div class="logo-tagline">Smart Mental Health</div></div></div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">Overview</div>
      <a href="dashboard.html" class="nav-link"><div class="nav-dot"></div><i class="fas fa-home"></i><span>Dashboard</span></a>
      <a href="mood.html" class="nav-link"><div class="nav-dot"></div><i class="fas fa-heart-pulse"></i><span>Mood Tracker</span></a>
      <div class="nav-group-label">Wellness Tools</div>
      <a href="AI-support.html" class="nav-link"><div class="nav-dot"></div><i class="fas fa-robot"></i><span>Zen AI</span></a>
      <a href="breathe.html" class="nav-link"><div class="nav-dot"></div><i class="fas fa-wind"></i><span>Breathe</span></a>
      <a href="journal.html" class="nav-link"><div class="nav-dot"></div><i class="fas fa-book-open"></i><span>Journal</span></a>
      <div class="nav-group-label">Care</div>
      <a href="resources.html" class="nav-link"><div class="nav-dot"></div><i class="fas fa-layer-group"></i><span>Resources</span></a>
      <a href="appointment.html" class="nav-link"><div class="nav-dot"></div><i class="fas fa-calendar-check"></i><span>Appointments</span></a>
      <a href="mental-home.html" class="nav-link"><div class="nav-dot"></div><i class="fas fa-clipboard-list"></i><span>Assessment</span></a>
      <a href="mental-report.html" class="nav-link active"><div class="nav-dot"></div><i class="fas fa-chart-line"></i><span>My Report</span></a>
      <div class="nav-group-label">Account</div>
      <a href="profile.html" class="nav-link"><div class="nav-dot"></div><i class="fas fa-user"></i><span>Profile</span></a>
      <a href="setting.html" class="nav-link"><div class="nav-dot"></div><i class="fas fa-sliders"></i><span>Settings</span></a>
    </nav>
    <div class="sidebar-footer"><div class="user-card"><div class="user-av" id="sidebar-av">U</div><div><div class="user-name" id="sidebar-name">User</div><div class="user-role">Premium</div></div><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button></div></div>
  </aside>
  <main class="main-area">
    <div class="main-inner">
      <div class="page-header">
        <div>
          <div class="page-eyebrow">Your wellness journey</div>
          <h1 class="page-title">Mental Health <em>Report</em></h1>
          <div class="page-sub" id="report-date">Latest report</div>
        </div>
        <div class="header-actions">
          <button class="btn btn-ghost" onclick="window.location.href='mental-home.html'"><i class="fas fa-plus"></i> New Assessment</button>
        </div>
      </div>
      <div id="report-content"></div>
    </div>
  </main>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
requireAuth();
const u=getUser();
document.getElementById('sidebar-av').textContent=((u.firstName||'').charAt(0)+(u.lastName||'').charAt(0)).toUpperCase()||'U';
document.getElementById('sidebar-name').textContent=(u.firstName||'User')+' '+(u.lastName||'');
(function(){const c=document.getElementById('particles');for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';p.style.cssText=`left:${Math.random()*100}%;width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;animation-duration:${Math.random()*20+15}s;animation-delay:${-(Math.random()*20)}s;opacity:${Math.random()*.3+.1}`;c.appendChild(p);}})();

const riskColors = { low:'#52b788', moderate:'#f4a261', high:'#e07080', severe:'#ff6060' };
const sevColors  = { normal:'#52b788', mild:'#f4a261', moderate:'#e07080', severe:'#ff6060', minimal:'#74c69d' };

async function loadReport() {
  const c = document.getElementById('report-content');
  try {
    const data = await authFetch('/api/mental-health/reports?limit=1');
    if (!data?.success || !data.data.length) {
      c.innerHTML = `<div class="report-empty"><div style="font-size:48px;margin-bottom:16px;">📋</div><h2>No report yet</h2><p>Complete your first mental health assessment to get your personalised report.</p><a href="mental-home.html" class="btn btn-primary" style="margin-top:20px;display:inline-flex;">Start Assessment →</a></div>`;
      return;
    }
    const r = data.data[0];
    document.getElementById('report-date').textContent = 'Generated ' + formatDate(r.createdAt);

    const riskClass = 'risk-' + r.overallRisk;
    const col = riskColors[r.overallRisk] || '#52b788';

    c.innerHTML = `
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap;">
        <span class="risk-badge ${riskClass}">⬤ ${r.overallRisk} risk</span>
        <span style="font-size:13px;color:var(--muted);">Report v${r.reportVersion||'2.0'}</span>
      </div>

      <div class="two-col" style="margin-bottom:14px;">
        <div class="card">
          <div class="card-head">Assessment Scores</div>
          ${renderScore('Depression (DASS-21)', r.dass21.depression.score, 42, r.dass21.depression.severity)}
          ${renderScore('Anxiety (DASS-21)',    r.dass21.anxiety.score,    42, r.dass21.anxiety.severity)}
          ${renderScore('Stress (DASS-21)',     r.dass21.stress.score,     42, r.dass21.stress.severity)}
          ${renderScore('GAD-7 (Anxiety)',      r.gad7.score,              21, r.gad7.severity)}
          ${renderScore('PHQ-9 (Depression)',   r.phq9.score,              27, r.phq9.severity)}
        </div>
        <div class="card">
          <div class="card-head">Vital Signs</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            ${renderVital('Blood Pressure', r.vitals.systolic+'/'+r.vitals.diastolic+' mmHg', '💓')}
            ${renderVital('Heart Rate',     r.vitals.heartRate+' bpm', '❤️')}
            ${renderVital('Sleep',          r.vitals.sleepDuration+' hrs', '😴')}
            ${renderVital('Temperature',    r.vitals.temperature ? r.vitals.temperature+'°C' : '—', '🌡️')}
          </div>
          <div style="margin-top:20px;">
            <div class="card-head">Radar Overview</div>
            <div style="position:relative;height:160px;width:100%;">
              <canvas id="radarChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">Personalised Recommendations (${r.recommendations.length})</div>
        <div id="recs"></div>
      </div>`;

    // Render recs
    const recsEl = document.getElementById('recs');
    const prColors = { high:'color:#e07080;', medium:'color:#f4a261;', low:'color:#52b788;' };
    r.recommendations.forEach(rec => {
      const div = document.createElement('div'); div.className = 'rec-card';
      div.innerHTML = `<div class="rec-priority" style="${prColors[rec.priority]||''}">${rec.priority} priority · ${rec.category}</div><div class="rec-title">${rec.title}</div><div class="rec-desc">${rec.description}</div>`;
      recsEl.appendChild(div);
    });

    // Radar chart — wrapped in a sized container so Chart.js respects dimensions
    setTimeout(() => {
      const ctx = document.getElementById('radarChart');
      if (!ctx) return;
      new Chart(ctx, {
        type: 'radar',
        data: {
          labels: ['Depression','Anxiety','Stress','GAD-7','PHQ-9'],
          datasets:[{ label:'Your scores', data:[
            Math.round(r.dass21.depression.score/42*100),
            Math.round(r.dass21.anxiety.score/42*100),
            Math.round(r.dass21.stress.score/42*100),
            Math.round(r.gad7.score/21*100),
            Math.round(r.phq9.score/27*100),
          ], borderColor: col, backgroundColor: col+'22', pointBackgroundColor: col, pointBorderColor:'#0a0e14', pointBorderWidth:2 }]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false,
          scales:{ r:{ min:0,max:100, grid:{color:'rgba(255,255,255,.06)'}, angleLines:{color:'rgba(255,255,255,.06)'}, ticks:{color:'rgba(255,255,255,.3)',font:{size:9}}, pointLabels:{color:'rgba(255,255,255,.5)',font:{size:10}} }},
          plugins:{ legend:{display:false} }
        }
      });
    }, 100);

  } catch(e) { c.innerHTML = '<div class="report-empty"><p>Could not load report. Check your connection.</p></div>'; }
}

function renderScore(label, score, max, sev) {
  const pct = Math.round(score/max*100);
  const col = sevColors[sev] || '#8892a4';
  return `<div style="margin-bottom:14px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
      <span style="font-size:13px;color:rgba(255,255,255,.7);">${label}</span>
      <span style="font-size:11px;font-weight:700;color:${col};">${sev} · ${score}/${max}</span>
    </div>
    <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${col};"></div></div>
  </div>`;
}
function renderVital(label, value, icon) {
  return `<div style="background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;">
    <div style="font-size:20px;margin-bottom:6px;">${icon}</div>
    <div style="font-size:15px;font-weight:700;color:#fff;">${value}</div>
    <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;">${label}</div>
  </div>`;
}

loadReport();
</script>
</body>
</html>
